<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="390" viewBox="0 0 1600 390" role="img" aria-labelledby="title desc">
  <title id="title">SLM Fourier-plane setup with projection magnification</title>
  <desc id="desc">From right to left: an SLM, a 50 centimeter focal-length lens, the Fourier-plane screen, a 30 centimeter magnifying lens, and the wall.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse">
      <path d="M 0 0 L 8 4 L 0 8 Z" fill="#54606c"/>
    </marker>
    <style>
      .label { font: 600 25px Arial, Helvetica, sans-serif; fill: #1f2933; }
      .detail { font: 20px Arial, Helvetica, sans-serif; fill: #54606c; }
      .axis { stroke: #9aa5b1; stroke-width: 3; }
      .dim { stroke: #54606c; stroke-width: 2; marker-start: url(#arrow); marker-end: url(#arrow); }
      .guide { stroke: #c5cbd3; stroke-width: 2; stroke-dasharray: 6 7; }
      .lens { fill: #dbeef5; stroke: #2f6f89; stroke-width: 5; }
      .stand { stroke: #2f6f89; stroke-width: 5; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1600" height="390" fill="#ffffff"/>
  <line class="axis" x1="105" y1="195" x2="1510" y2="195"/>

  <!-- Wall -->
  <rect x="82" y="80" width="22" height="230" fill="#eef1f4" stroke="#34495e" stroke-width="4"/>
  <path d="M 82 96 l-20 12 M 82 136 l-20 12 M 82 176 l-20 12 M 82 216 l-20 12 M 82 256 l-20 12"
        stroke="#9aa5b1" stroke-width="3"/>
  <text class="label" x="93" y="352" text-anchor="middle">Wall</text>

  <!-- 30 cm projection lens -->
  <path class="lens" d="M 360 98 C 334 125 334 265 360 292 C 386 265 386 125 360 98 Z"/>
  <line class="stand" x1="360" y1="292" x2="360" y2="316"/>
  <line class="stand" x1="332" y1="316" x2="388" y2="316"/>
  <text class="label" x="360" y="352" text-anchor="middle">Magnifying lens</text>
  <text class="detail" x="360" y="377" text-anchor="middle">f = 30 cm</text>

  <!-- Fourier-plane screen -->
  <rect x="640" y="102" width="18" height="186" rx="2" fill="#f5f7fa" stroke="#34495e" stroke-width="4"/>
  <line x1="649" y1="288" x2="649" y2="312" stroke="#34495e" stroke-width="5"/>
  <line x1="623" y1="312" x2="675" y2="312" stroke="#34495e" stroke-width="5" stroke-linecap="round"/>
  <text class="label" x="649" y="352" text-anchor="middle">Fourier plane</text>
  <text class="detail" x="649" y="377" text-anchor="middle">screen position</text>

  <!-- 50 cm Fourier lens -->
  <path class="lens" d="M 1070 88 C 1040 118 1040 272 1070 302 C 1100 272 1100 118 1070 88 Z"/>
  <line class="stand" x1="1070" y1="302" x2="1070" y2="326"/>
  <line class="stand" x1="1040" y1="326" x2="1100" y2="326"/>
  <text class="label" x="1070" y="362" text-anchor="middle">Fourier lens</text>
  <text class="detail" x="1070" y="387" text-anchor="middle">f = 50 cm</text>

  <!-- SLM -->
  <rect x="1490" y="110" width="24" height="170" rx="3" fill="#34495e"/>
  <rect x="1474" y="124" width="16" height="142" fill="#9fc5d8" stroke="#34495e" stroke-width="3"/>
  <line x1="1502" y1="280" x2="1502" y2="312" stroke="#34495e" stroke-width="5"/>
  <line x1="1476" y1="312" x2="1528" y2="312" stroke="#34495e" stroke-width="5" stroke-linecap="round"/>
  <text class="label" x="1502" y="352" text-anchor="middle">SLM</text>

  <!-- Measured 2f distances -->
  <line class="guide" x1="658" y1="126" x2="658" y2="58"/>
  <line class="guide" x1="1050" y1="126" x2="1050" y2="58"/>
  <line class="guide" x1="1090" y1="126" x2="1090" y2="58"/>
  <line class="guide" x1="1474" y1="126" x2="1474" y2="58"/>
  <line class="dim" x1="668" y1="66" x2="1040" y2="66"/>
  <line class="dim" x1="1100" y1="66" x2="1464" y2="66"/>
  <text class="detail" x="854" y="49" text-anchor="middle">50 cm</text>
  <text class="detail" x="1282" y="49" text-anchor="middle">50 cm</text>

</svg>
