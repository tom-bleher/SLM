<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="500" viewBox="0 0 1600 500" role="img" aria-labelledby="title desc">
  <title id="title">Reflective SLM 4f optical system</title>
  <desc id="desc">From right to left, light from the SLM passes through lens L1, the Fourier plane, lens L2, and reaches the wall at the image plane.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse">
      <path d="M0 0 L8 4 L0 8 Z" fill="#54606c"/>
    </marker>
    <style>
      .label{font:600 24px Arial,Helvetica,sans-serif;fill:#1f2933}
      .detail{font:20px Arial,Helvetica,sans-serif;fill:#54606c}
      .axis{stroke:#9aa5b1;stroke-width:3}
      .dim{stroke:#54606c;stroke-width:2;marker-start:url(#arrow);marker-end:url(#arrow)}
      .guide{stroke:#c5cbd3;stroke-width:2;stroke-dasharray:6 7}
      .lens{fill:#dbeef5;stroke:#2f6f89;stroke-width:5}
      .stand{stroke:#2f6f89;stroke-width:5;stroke-linecap:round}
    </style>
  </defs>
  <rect width="1600" height="500" fill="#fff"/>
  <line class="axis" x1="115" y1="235" x2="1460" y2="235"/>

  <!-- Wall at image plane -->
  <rect x="92" y="120" width="24" height="230" fill="#eef1f4" stroke="#34495e" stroke-width="4"/>
  <path d="M92 136l-20 12M92 176l-20 12M92 216l-20 12M92 256l-20 12M92 296l-20 12"
        stroke="#9aa5b1" stroke-width="3"/>
  <text class="label" x="104" y="393" text-anchor="middle">Wall</text>
  <text class="detail" x="104" y="419" text-anchor="middle">image plane</text>

  <!-- L2 -->
  <path class="lens" d="M360 130C332 160 332 310 360 340C388 310 388 160 360 130Z"/>
  <line class="stand" x1="360" y1="340" x2="360" y2="365"/>
  <line class="stand" x1="332" y1="365" x2="388" y2="365"/>
  <text class="label" x="360" y="407" text-anchor="middle">L2</text>
  <text class="detail" x="360" y="433" text-anchor="middle">focal length f2</text>

  <!-- Fourier plane -->
  <rect x="642" y="162" width="16" height="146" transform="rotate(-18 650 235)" fill="#b8c2cc" stroke="#34495e" stroke-width="4"/>
  <circle cx="650" cy="235" r="9" fill="#fff" stroke="#34495e" stroke-width="3"/>
  <text class="label" x="650" y="393" text-anchor="middle">Fourier plane</text>
  <text class="detail" x="650" y="419" text-anchor="middle">spatial filter</text>

  <!-- L1 -->
  <path class="lens" d="M940 130C912 160 912 310 940 340C968 310 968 160 940 130Z"/>
  <line class="stand" x1="940" y1="340" x2="940" y2="365"/>
  <line class="stand" x1="912" y1="365" x2="968" y2="365"/>
  <text class="label" x="940" y="407" text-anchor="middle">L1</text>
  <text class="detail" x="940" y="433" text-anchor="middle">focal length f1</text>

  <!-- SLM -->
  <rect x="1450" y="150" width="26" height="170" rx="3" fill="#34495e"/>
  <rect x="1432" y="164" width="18" height="142" fill="#9fc5d8" stroke="#34495e" stroke-width="3"/>
  <line x1="1463" y1="320" x2="1463" y2="350" stroke="#34495e" stroke-width="5"/>
  <line x1="1436" y1="350" x2="1490" y2="350" stroke="#34495e" stroke-width="5" stroke-linecap="round"/>
  <text class="label" x="1463" y="393" text-anchor="middle">SLM</text>

  <!-- 4f distances -->
  <line class="guide" x1="125" y1="205" x2="125" y2="475"/>
  <line class="guide" x1="340" y1="205" x2="340" y2="475"/>
  <line class="guide" x1="380" y1="205" x2="380" y2="475"/>
  <line class="guide" x1="630" y1="205" x2="630" y2="475"/>
  <line class="guide" x1="670" y1="205" x2="670" y2="475"/>
  <line class="guide" x1="920" y1="205" x2="920" y2="475"/>
  <line class="guide" x1="960" y1="205" x2="960" y2="475"/>
  <line class="guide" x1="1432" y1="205" x2="1432" y2="475"/>
  <line class="dim" x1="135" y1="470" x2="330" y2="470"/>
  <line class="dim" x1="390" y1="470" x2="620" y2="470"/>
  <line class="dim" x1="680" y1="470" x2="910" y2="470"/>
  <line class="dim" x1="970" y1="470" x2="1422" y2="470"/>
  <text class="detail" x="232" y="457" text-anchor="middle">f2</text>
  <text class="detail" x="505" y="457" text-anchor="middle">f2</text>
  <text class="detail" x="795" y="457" text-anchor="middle">f1</text>
  <text class="detail" x="1196" y="457" text-anchor="middle">f1</text>
</svg>
